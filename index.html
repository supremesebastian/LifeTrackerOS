function mkS(defs){
  var d=getDay();
  return {ob:false,date:d,xp:0,xpD:0,perfDays:0,totalDone:0,customN:0,learnN:0,maxStreak:0,wH:[],xH:[],
    tasks:(defs||SDT).map(function(t){return{id:t.id,title:t.title,desc:t.desc,cat:t.cat,icon:t.icon,tt:t.tt,tv:t.tv,unit:t.unit,diff:t.diff,xp:t.xp,ls:t.ls,rec:t.rec,color:t.color,custom:false,prog:0,done:false,streak:0,totalDone:0,lastDone:null,arch:false}}),
    stats:SSt.map(function(s){return{id:s.id,name:s.name,icon:s.icon,value:s.value,color:s.color}}),
    cats:SC.map(function(c){return{id:c.id,name:c.name,icon:c.icon,color:c.color}}),
    achs:SAch.map(function(a){return{id:a.id,title:a.title,desc:a.desc,icon:a.icon,ct:a.ct,cv:a.cv,xp:a.xp,unlocked:false,prog:0}}),
    learns:SLrn.map(function(l){return{id:l.id,title:l.title,author:l.author,sum:l.sum,kp:l.kp,acts:l.acts,cat:l.cat,read:l.read}}),
    nutrition:{date:d,entries:[],apiKey:"",kcalGoal:2000},
    nutritionHistory:[]
  };
}

function roll(s,now){
  var act=s.tasks.filter(function(t){return !t.arch});
  var ad=act.length>0&&act.every(function(t){return t.done});
  var r=act.length>0?act.filter(function(t){return t.done}).length/act.length:0;
  var tasks=s.tasks.map(function(t){return t.arch?t:Object.assign({},t,{prog:0,done:false,streak:t.done?t.streak+1:0})});
  var ms=s.maxStreak;
  tasks.forEach(function(t){if(t.streak>ms)ms=t.streak});
  var nutr=s.nutrition||{entries:[],apiKey:"",kcalGoal:2000};
  var ae=nutr.entries.filter(function(e){return e.analysis});
  var daySum={date:s.date,kcal:Math.round(ae.reduce(function(a,e){return a+(e.analysis.calories||0)},0)),protein:Math.round(ae.reduce(function(a,e){return a+(e.analysis.protein_g||0)},0)),carbs:Math.round(ae.reduce(function(a,e){return a+(e.analysis.carbs_g||0)},0)),fat:Math.round(ae.reduce(function(a,e){return a+(e.analysis.fat_g||0)},0)),entryCount:nutr.entries.length};
  var nh=(s.nutritionHistory||[]).filter(function(h){return h.date!==s.date});
  if(daySum.entryCount>0)nh=[daySum].concat(nh).slice(0,60);
  return Object.assign({},s,{date:now,xpD:0,perfDays:ad?s.perfDays+1:s.perfDays,wH:s.wH.concat([{d:s.date,rate:r,xp:s.xpD}]).slice(-30),tasks:tasks,maxStreak:ms,nutrition:Object.assign({},nutr,{date:now,entries:[]}),nutritionHistory:nh});
}

function red(state,action){
  var now=getDay();
  var s=state;
  if(s.date&&s.date!==now&&action.type!=="OB"&&action.type!=="RST"&&action.type!=="LD"){s=roll(s,now)}
  switch(action.type){
    case "LD":{var b=mkS(null);var m=Object.assign({},b,action.data);if(m.date&&m.date!==now)return roll(m,now);return m}
    case "OB":{var f=mkS(action.tasks);return Object.assign({},f,{ob:true,date:now})}
    case "PROG":{
      var id=action.id,amt=action.amt;
      var xG=0,dd=false;
      var ns=s.stats.map(function(x){return Object.assign({},x)});
      var tasks=s.tasks.map(function(t){
        if(t.id!==id||t.done)return t;
        var np=cl(t.prog+amt,0,t.tv);
        var fin=np>=t.tv;
        if(fin){
          dd=true;
          var d=DF.find(function(x){return x.id===t.diff})||DF[1];
          xG=Math.floor(t.xp*d.m);
          (t.ls||[]).forEach(function(l){ns=ns.map(function(st){return st.id===l.sid?Object.assign({},st,{value:st.value+l.a}):st})});
        }
        return Object.assign({},t,{prog:np,done:fin,lastDone:fin?now:t.lastDone,totalDone:fin?t.totalDone+1:t.totalDone});
      });
      return Object.assign({},s,{tasks:tasks,stats:ns,xp:s.xp+xG,xpD:s.xpD+xG,totalDone:s.totalDone+(dd?1:0),xH:xG>0?s.xH.concat([{d:now,xp:xG}]).slice(-100):s.xH});
    }
    case "TOG":{
      var t=s.tasks.find(function(x){return x.id===action.id});
      if(!t)return s;
      if(!t.done)return red(s,{type:"PROG",id:action.id,amt:1});
      return Object.assign({},s,{tasks:s.tasks.map(function(x){return x.id===action.id?Object.assign({},x,{done:false,prog:0,totalDone:Math.max(0,x.totalDone-1)}):x})});
    }
    case "STV":return Object.assign({},s,{tasks:s.tasks.map(function(t){return t.id===action.id?Object.assign({},t,{tv:action.v,done:t.prog>=action.v}):t})});
    case "ADD":{var nt=Object.assign({},action.task,{id:mkId(),custom:true,prog:0,done:false,streak:0,totalDone:0,lastDone:null,arch:false});return Object.assign({},s,{tasks:s.tasks.concat([nt]),customN:s.customN+1})}
    case "EDT":return Object.assign({},s,{tasks:s.tasks.map(function(t){return t.id===action.task.id?Object.assign({},t,action.task):t})});
    case "ARC":return Object.assign({},s,{tasks:s.tasks.map(function(t){return t.id===action.id?Object.assign({},t,{arch:true}):t})});
    case "ACAT":return Object.assign({},s,{cats:s.cats.concat([Object.assign({id:mkId()},action.c)])});
    case "RDL":{var w=false;var lr=s.learns.find(function(l){return l.id===action.id});if(lr&&lr.read<100)w=true;return Object.assign({},s,{learns:s.learns.map(function(l){return l.id===action.id?Object.assign({},l,{read:100}):l}),learnN:w?s.learnN+1:s.learnN})}
    case "RST":return Object.assign({},mkS(null),{ob:false});
    case "NUTR_ADD":{var ne={id:action.id||mkId(),text:action.text,ts:Date.now(),analysis:null,satiety:null};var nn=s.nutrition||{entries:[],apiKey:""};return Object.assign({},s,{nutrition:Object.assign({},nn,{entries:nn.entries.concat([ne])})})}
    case "NUTR_DEL":{var nd=s.nutrition||{entries:[],apiKey:""};return Object.assign({},s,{nutrition:Object.assign({},nd,{entries:nd.entries.filter(function(e){return e.id!==action.id})})})}
    case "NUTR_ANALYSIS":{var na=s.nutrition||{entries:[],apiKey:""};return Object.assign({},s,{nutrition:Object.assign({},na,{entries:na.entries.map(function(e){return e.id===action.id?Object.assign({},e,{analysis:action.data}):e})})})}
    case "NUTR_KEY":{var nk=s.nutrition||{entries:[],apiKey:"",kcalGoal:2000};return Object.assign({},s,{nutrition:Object.assign({},nk,{apiKey:action.key})})}
    case "NUTR_GOAL":{var ng=s.nutrition||{entries:[],apiKey:"",kcalGoal:2000};return Object.assign({},s,{nutrition:Object.assign({},ng,{kcalGoal:action.goal})})}
    case "NUTR_SATIETY":{var nsat=s.nutrition||{entries:[]};return Object.assign({},s,{nutrition:Object.assign({},nsat,{entries:nsat.entries.map(function(e){return e.id===action.id?Object.assign({},e,{satiety:action.satiety}):e})})})}
    default:return s;
  }
}

function eA(s){
  return s.achs.map(function(a){
    if(a.unlocked)return a;
    var p=0;
    if(a.ct==="totalDone")p=s.totalDone;
    else if(a.ct==="maxStreak")p=s.maxStreak;
    else if(a.ct==="totalXP")p=s.xp;
    else if(a.ct==="perfDays")p=s.perfDays;
    else if(a.ct==="customN")p=s.customN;
    else if(a.ct==="learnN")p=s.learnN;
    return Object.assign({},a,{prog:p,unlocked:p>=a.cv});
  });
}

}
function CP(props){
  var p=props.mx>0?cl(props.v/props.mx,0,1):0;
  var sz=props.sz||56,sw=props.sw||4,color=props.color||T.pri;

    </svg>
    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{props.children}</div>

}
function Toaster(props){
  if(!props.msg)return null;
  return <div style={{position:"fixed",top:56,left:"50%",transform:"translateX(-50%)",zIndex:999,background:T.tx,color:"#fff",padding:"12px 24px",borderRadius:16,fontSize:14,fontWeight:600,fontFamily:ff,boxShadow:"0 8px 32px rgba(0,0,0,.2)",animation:"pop .3s",whiteSpace:"nowrap"}}>{props.msg}</div>;

function Sheet(props){
  if(!props.open)return null;
  return <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={props.onClose}>
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)"}}/>

/* HOME */
function Home(props){
  var c=useC();var s=c.state,d=c.dispatch;
  var _t=useState(null),toast=_t[0],setToast=_t[1];
  function flash(m){setToast(m);setTimeout(function(){setToast(null)},2000)}

  var act=s.tasks.filter(function(t){return !t.arch});
  var dn=act.filter(function(t){return t.done}).length;
  var lv=lvI(s.xp);
  var pct=act.length>0?dn/act.length:0;

  function stepF(t){
    if(t.tt==="quantity")return 0.5;
    if(t.tt==="distance"&&t.unit==="steps")return 1000;
    if(t.tt==="duration")return 5;
    if(t.tt==="pages")return 5;
    return 1;
  }
  function addP(id,amt){
    var t=s.tasks.find(function(x){return x.id===id});
    if(!t||t.done)return;
    d({type:"PROG",id:id,amt:amt});
    if(t.prog+amt>=t.tv)flash("✅ "+t.title+" +"+t.xp+" XP");
  }

  return <div>
    <Toaster msg={toast}/>
    <div style={stkS}>
      <div><h1 style={{fontFamily:fd,fontSize:24,fontWeight:700,margin:0}}>Today</h1><p style={Object.assign({},smS,{margin:0})}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</p></div>
      <div style={{display:"flex",gap:8}}><Bd bg={T.priL} fg={T.priD}>Lv.{lv.level}</Bd><Bd bg={T.xpL} fg="#92400e">⚡{s.xpD}</Bd></div>
    </div>
    <div style={{padding:"0 20px 20px"}}>
      <Cd s={{background:"linear-gradient(135deg,"+T.pri+"08,"+T.pri+"15)",border:"1px solid "+T.pri+"20"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontSize:14,fontWeight:600}}>Daily Progress</span><span style={{fontSize:14,fontWeight:700,color:T.pri}}>{dn}/{act.length}</span></div>
        <PB v={dn} mx={act.length} h={8}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}><span style={smS}>Level {lv.level} · {lv.cur}/{lv.next} XP</span><span style={smS}>{Math.round(pct*100)}%</span></div>
        <PB v={lv.cur} mx={lv.next} color={T.acc} h={4}/>
      </Cd>

      {s.tasks.filter(function(t){return t.streak>0&&!t.arch}).length>0&&<div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:16,paddingBottom:4}}>{s.tasks.filter(function(t){return t.streak>0&&!t.arch}).map(function(t){return <Bd key={t.id} bg="#FEF3C7" fg="#92400e">🔥{t.streak}d · {t.icon}{t.title}</Bd>})}</div>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><p style={lblS}>Today's Tasks</p><Btn onClick={function(){props.nav("ed",{})}} s={{fontSize:12,color:T.pri,background:"none",padding:"4px 8px"}}>+ Add</Btn></div>

      {act.length===0?<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:48,marginBottom:12}}>📋</div><p style={Object.assign({},hdS(17),{color:T.tx2})}>No tasks yet</p></div>
      :act.map(function(t,i){return <Cd key={t.id} onClick={function(){props.nav("det",{id:t.id})}} s={{animation:"slideUp .3s ease "+i*0.04+"s both"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {t.tt==="binary"?
            <Btn onClick={function(e){e.stopPropagation();d({type:"TOG",id:t.id});if(!t.done)flash("✅ "+t.title+" +"+t.xp+" XP")}} s={{width:44,height:44,borderRadius:22,border:"2.5px solid "+(t.done?T.ok:(t.color||T.brd)),background:t.done?T.ok:"transparent",flexShrink:0}}>
              {t.done?<span style={{color:"#fff",fontSize:20}}>✓</span>:<span style={{fontSize:22}}>{t.icon}</span>}
            </Btn>
          :<CP v={t.prog} mx={t.tv} sz={44} color={t.done?T.ok:(t.color||T.pri)}><span style={{fontSize:18}}>{t.done?"✓":t.icon}</span></CP>
          }
          <div style={{flex:1,minWidth:0}}>
            <p style={Object.assign({},hdS(15),{textDecoration:t.done?"line-through":"none",opacity:t.done?0.5:1})}>{t.title}</p>
            <p style={Object.assign({},smS,{margin:"2px 0 0"})}>{t.tt==="binary"?(t.done?"Done":"Tap to complete"):t.prog+"/"+t.tv+" "+t.unit}{t.streak>0?" · 🔥"+t.streak+"d":""}</p>
          </div>
          {t.tt!=="binary"&&!t.done&&<Btn onClick={function(e){e.stopPropagation();addP(t.id,stepF(t))}} s={{width:40,height:40,borderRadius:12,background:(t.color||T.pri)+"12",border:"1px solid "+(t.color||T.pri)+"30"}}><span style={{fontSize:16,color:t.color||T.pri}}>+</span></Btn>}
          {t.done&&<Bd bg={T.xpL} fg="#92400e">⚡{t.xp}</Bd>}
        </div>
        {t.tt!=="binary"&&<div style={{marginTop:10}}><PB v={t.prog} mx={t.tv} color={t.done?T.ok:(t.color||T.pri)}/></div>}
      </Cd>})}
    </div>
  </div>;
}

/* DETAIL */

        <h1 style={{fontFamily:fd,fontSize:28,fontWeight:700,margin:0}}>{t.title}</h1>
        {t.desc&&<p style={{fontSize:14,color:T.tx2,margin:"4px 0 0"}}>{t.desc}</p>}

        </div>
      </div>
      <Cd s={{textAlign:"center"}}><p style={Object.assign({},lblS,{textAlign:"center"})}>Today's Progress</p><div style={{display:"flex",justifyContent:"center",margin:"16px 0"}}>
        {t.tt==="binary"?<Btn onClick={function(){d({type:"TOG",id:t.id})}} s={Object.assign({},t.done?{background:T.ok,color:"#fff"}:bpS,{width:200,height:56,borderRadius:28,fontSize:17})}>{t.done?"✓ Completed":"Mark Complete"}</Btn>
        :<div><CP v={t.prog} mx={t.tv} sz={120} sw={8} color={t.done?T.ok:(t.color||T.pri)}><div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:700,fontFamily:fd}}>{t.prog}</div><div style={{fontSize:11,color:T.tx2}}>/ {t.tv} {t.unit}</div></div></CP>
        {!t.done&&<div style={{marginTop:16,display:"flex",gap:8,justifyContent:"center"}}>{[step,step*2].map(function(a,i){return <Btn key={i} onClick={function(){d({type:"PROG",id:t.id,amt:a});if(t.prog+a>=t.tv)flash("✅ +"+t.xp+" XP")}} s={Object.assign({},bpS,bsmS)}>+{a} {t.unit}</Btn>})}</div>}</div>}
      </div></Cd>
      {t.tt!=="binary"&&<Cd><p style={lblS}>Adjust Target</p><div style={{display:"flex",justifyContent:"center"}}><Stp value={t.tv} onChange={function(v){d({type:"STV",id:t.id,v:v})}} min={1} step={t.tt==="quantity"?0.5:t.tt==="distance"&&t.unit==="steps"?500:1} unit={t.unit}/></div></Cd>}
      {lks.length>0&&<Cd><p style={lblS}>Linked Stats</p><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{lks.map(function(l){return <Ch key={l.sid} s={{borderColor:l.st.color+"40",background:l.st.color+"10"}}>{l.st.icon} {l.st.name} <span style={{color:T.ok,fontWeight:700}}>+{l.a}</span></Ch>})}</div></Cd>}

/* EDITOR */
function Ed(props){
  var c=useC();var s=c.state,d=c.dispatch;
  var ex=props.id?s.tasks.find(function(t){return t.id===props.id}):null;
  var _f=useState({title:ex?ex.title:"",desc:ex?ex.desc:"",cat:ex?ex.cat:(s.cats[0]?s.cats[0].id:""),icon:ex?ex.icon:"⚡",tt:ex?ex.tt:"count",tv:ex?ex.tv:1,unit:ex?ex.unit:"times",diff:ex?ex.diff:"medium",xp:ex?ex.xp:30,rec:ex?ex.rec:"daily",color:ex?ex.color:T.pri,ls:ex?ex.ls:[]}),f=_f[0],setF=_f[1];
  var _si=useState(false),sic=_si[0],setSic=_si[1];
  var _nc=useState(""),nc=_nc[0],setNc=_nc[1];
  var _snc=useState(false),snc=_snc[0],setSnc=_snc[1];
  function u(k,v){setF(function(p){var o={};o[k]=v;return Object.assign({},p,o)})}
  var tt=TT.find(function(x){return x.id===f.tt});
  function tSt(sid){setF(function(p){var has=p.ls.find(function(x){return x.sid===sid});return Object.assign({},p,{ls:has?p.ls.filter(function(x){return x.sid!==sid}):p.ls.concat([{sid:sid,a:2}])})})}
  function save(){if(!f.title.trim())return;if(ex)d({type:"EDT",task:Object.assign({},ex,f)});else d({type:"ADD",task:f});props.back()}

  return <div>
    <div style={stkS}><Btn onClick={props.back} s={{width:40,height:40,background:"none",fontSize:20}}>←</Btn><span style={hdS(17)}>{ex?"Edit Task":"New Task"}</span><Btn onClick={save} s={Object.assign({},bpS,bsmS)}>Save</Btn></div>
    <div style={{padding:"0 20px 20px"}}>
      <div style={{display:"flex",gap:12,marginBottom:16}}><Btn onClick={function(){setSic(!sic)}} s={{width:52,height:52,fontSize:28,borderRadius:16,border:"1px solid "+T.brd,background:T.card}}>{f.icon}</Btn><input style={Object.assign({},iptS,{flex:1,fontSize:18,fontWeight:600})} placeholder="Task name" value={f.title} onChange={function(e){u("title",e.target.value)}}/></div>
      {sic&&<Cd s={{display:"flex",flexWrap:"wrap",gap:8}}>{ICS.map(function(ic){return <Btn key={ic} onClick={function(){u("icon",ic);setSic(false)}} s={{width:40,height:40,borderRadius:12,border:"1px solid "+(f.icon===ic?T.pri:T.brd),background:f.icon===ic?T.priL:"transparent",fontSize:18}}>{ic}</Btn>})}</Cd>}
      <textarea style={Object.assign({},iptS,{minHeight:80,resize:"vertical",marginBottom:16})} placeholder="Description" value={f.desc} onChange={function(e){u("desc",e.target.value)}}/>

      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>{s.cats.map(function(cat){return <Ch key={cat.id} on={f.cat===cat.id} onClick={function(){u("cat",cat.id)}}>{cat.icon} {cat.name}</Ch>})}<Ch onClick={function(){setSnc(true)}} s={{borderStyle:"dashed"}}>+ New</Ch></div>
      {snc&&<div style={{display:"flex",gap:8,marginBottom:12}}><input style={Object.assign({},iptS,{flex:1})} placeholder="Name" value={nc} onChange={function(e){setNc(e.target.value)}}/><Btn onClick={function(){if(nc.trim()){d({type:"ACAT",c:{name:nc,icon:"📁",color:T.pri}});setNc("");setSnc(false)}}} s={Object.assign({},bpS,bsmS)}>Add</Btn></div>}

/* NUTRITION */
function getRecentFoods(){try{return JSON.parse(localStorage.getItem("lifeos-rf")||"[]")}catch(e){return[]}}
function saveRecentFood(t){var r=[t].concat(getRecentFoods().filter(function(f){return f!==t})).slice(0,8);localStorage.setItem("lifeos-rf",JSON.stringify(r));return r;}

function NutrTab(){
  var _c=useC(),state=_c.state,dispatch=_c.dispatch;
  var nutr=state.nutrition||{entries:[],apiKey:"",kcalGoal:2000};
  var kcalGoal=nutr.kcalGoal||2000;
  var entries=nutr.entries||[];
  var _t=useState(""),text=_t[0],setText=_t[1];
  var _az=useState({}),analyzing=_az[0],setAnalyzing=_az[1];
  var _exp=useState(null),expanded=_exp[0],setExpanded=_exp[1];
  var _rf=useState(getRecentFoods()),recentFoods=_rf[0],setRecentFoods=_rf[1];
  var _toast=useState(""),toast=_toast[0],setToast=_toast[1];

  function showT(m){setToast(m);setTimeout(function(){setToast("")},2500)}

  function submit(){
    if(!text.trim())return;
    var t=text.trim(),id=mkId();
    dispatch({type:"NUTR_ADD",text:t,id:id});
    setText("");
    var rf=saveRecentFood(t);
    setRecentFoods(rf);
    if(nutr.apiKey)autoAnalyze(id,t,nutr.apiKey);
  }

  async function autoAnalyze(id,foodText,key){
    setAnalyzing(function(a){var x=Object.assign({},a);x[id]=true;return x;});
    try{
      var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:"Nährwerte für: \""+foodText+"\"\nNur JSON: {\"protein_g\":n,\"carbs_g\":n,\"fat_g\":n,\"calories\":n}\nTypische Portionen wenn nicht angegeben."}]})});
      var data=await res.json();
      if(data.error)throw new Error(data.error.message);
      var m=data.content[0].text.match(/\{[\s\S]*\}/);
      if(!m)throw new Error();
      dispatch({type:"NUTR_ANALYSIS",id:id,data:JSON.parse(m[0])});
    }catch(e){}
    setAnalyzing(function(a){var x=Object.assign({},a);delete x[id];return x;});
  }

  var analyzed=entries.filter(function(e){return e.analysis});
  var totals=analyzed.reduce(function(acc,e){return{kcal:acc.kcal+(e.analysis.calories||0),protein:acc.protein+(e.analysis.protein_g||0),carbs:acc.carbs+(e.analysis.carbs_g||0),fat:acc.fat+(e.analysis.fat_g||0)}},{kcal:0,protein:0,carbs:0,fat:0});
  var kcalPct=Math.min(100,(totals.kcal/kcalGoal)*100);
  var over=totals.kcal>kcalGoal;
  var reversed=[].concat(entries).reverse();

  return <div style={{display:"flex",flexDirection:"column",height:"100%",background:T.bg,fontFamily:ff}}>
    <Toaster msg={toast}/>
    {/* Progress */}
    <div style={{padding:"16px 16px 8px",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
        <span style={{fontSize:20,fontWeight:700,fontFamily:fd,color:over?T.err:T.tx}}>{Math.round(totals.kcal)}<span style={{fontSize:13,fontWeight:400,color:T.tx2}}> / {kcalGoal} kcal</span></span>
        <span style={{fontSize:12,color:over?T.err:T.tx3}}>{over?"+"+(Math.round(totals.kcal)-kcalGoal)+" über Ziel":Math.max(0,kcalGoal-Math.round(totals.kcal))+" verbleibend"}</span>
      </div>
      <div style={{height:6,background:T.ca,borderRadius:3,overflow:"hidden",marginBottom:5}}>
        <div style={{height:"100%",width:kcalPct+"%",background:over?T.err:T.ok,borderRadius:3,transition:"width 0.4s"}}/>
      </div>
      {analyzed.length>0&&<p style={{fontSize:12,color:T.tx3,margin:0}}>🥩 {Math.round(totals.protein)}g · 🌾 {Math.round(totals.carbs)}g · 🫒 {Math.round(totals.fat)}g</p>}
    </div>

    {/* Input */}
    <div style={{padding:"0 16px 8px",flexShrink:0}}>
      <div style={{background:T.card,borderRadius:14,border:"1px solid "+T.brd,padding:"10px 12px"}}>
        <textarea value={text} onChange={function(e){setText(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submit();}}} placeholder="Was hast du gegessen?" style={{width:"100%",minHeight:entries.length>2?52:76,border:"none",outline:"none",fontSize:15,fontFamily:ff,color:T.tx,background:"transparent",resize:"none",lineHeight:1.5}}/>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:6}}>
          <Btn onClick={submit} disabled={!text.trim()} s={Object.assign({},bpS,{padding:"8px 20px",fontSize:13})}>Eintragen</Btn>
        </div>
      </div>
      {recentFoods.length>0&&!text&&<div style={{display:"flex",gap:6,marginTop:7,overflowX:"auto",paddingBottom:2}}>
        {recentFoods.map(function(f,i){return <Btn key={i} onClick={function(){setText(f)}} s={{background:T.ca,color:T.tx2,borderRadius:20,padding:"4px 11px",fontSize:12,whiteSpace:"nowrap",flexShrink:0,border:"1px solid "+T.brd}}>{f.length>22?f.slice(0,22)+"…":f}</Btn>;})}
      </div>}
    </div>

    {/* Meal list */}
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 100px"}}>
      {entries.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:T.tx3}}>
        <div style={{fontSize:40,marginBottom:10}}>🥗</div>
        <p style={{fontSize:15}}>Mahlzeiten eintragen</p>
        {!nutr.apiKey&&<p style={{fontSize:12,marginTop:6}}>API Key in Einstellungen hinterlegen für automatische Analyse</p>}
      </div>}
      {reversed.map(function(entry){
        var isExp=expanded===entry.id;
        var a=entry.analysis;
        var isAz=analyzing[entry.id];
        return <div key={entry.id} style={{marginBottom:6}}>
          <div onClick={function(){setExpanded(isExp?null:entry.id)}} style={{display:"flex",alignItems:"center",padding:"11px 13px",background:T.card,borderRadius:isExp?"12px 12px 0 0":12,border:"1px solid "+(isExp?T.pri:T.brd),cursor:"pointer",gap:8,transition:"border-color 0.15s"}}>
            <p style={{flex:1,fontSize:14,color:T.tx,margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entry.text}</p>
            <span style={{fontSize:13,fontWeight:600,color:isAz?T.tx3:a?T.tx:T.tx3,flexShrink:0}}>{isAz?"analysiert…":a?Math.round(a.calories)+" kcal":"—"}</span>
          </div>
          {isExp&&<div style={{background:T.ca,border:"1px solid "+T.pri,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"10px 13px"}}>
            {a&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
              <Bd bg="#fee2e2" fg="#991b1b">🥩 {Math.round(a.protein_g||0)}g</Bd>
              <Bd bg="#fed7aa" fg="#92400e">🌾 {Math.round(a.carbs_g||0)}g</Bd>
              <Bd bg="#fef9c3" fg="#854d0e">🫒 {Math.round(a.fat_g||0)}g</Bd>
            </div>}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:3}}>
                {[1,2,3,4,5].map(function(n){return <Btn key={n} onClick={function(){dispatch({type:"NUTR_SATIETY",id:entry.id,satiety:n})}} s={{fontSize:15,background:"none",padding:"2px",color:(entry.satiety||0)>=n?T.pri:T.brd}}>●</Btn>;})}
                <span style={{fontSize:11,color:T.tx3,marginLeft:3}}>Sättigung</span>
              </div>
              <Btn onClick={function(){dispatch({type:"NUTR_DEL",id:entry.id});setExpanded(null)}} s={{background:T.errL,color:T.err,borderRadius:8,padding:"5px 10px",fontSize:12}}>Löschen</Btn>
            </div>
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

/* VERLAUF */
function Verlauf(){
  var _c=useC(),state=_c.state;
  var nutr=state.nutrition||{entries:[],kcalGoal:2000};
  var kcalGoal=nutr.kcalGoal||2000;
  var history=state.nutritionHistory||[];
  var analyzed=(nutr.entries||[]).filter(function(e){return e.analysis});
  var todayKcal=Math.round(analyzed.reduce(function(a,e){return a+(e.analysis.calories||0)},0));
  var today={date:getDay(),kcal:todayKcal,entryCount:nutr.entries.length,goalHit:todayKcal>=kcalGoal*0.85&&todayKcal<=kcalGoal*1.15};
  var allDays=[today].concat(history.filter(function(h){return h.date!==getDay()})).slice(0,30);
  var last7=allDays.slice(0,7).filter(function(d){return d.entryCount>0});
  var avgKcal=last7.length>0?Math.round(last7.reduce(function(a,d){return a+d.kcal},0)/last7.length):0;
  var adherence=last7.filter(function(d){return d.goalHit}).length;
  function fmtDate(ds){var d=new Date(ds),dy=["So","Mo","Di","Mi","Do","Fr","Sa"];return dy[d.getDay()]+" "+d.getDate()+"."+(d.getMonth()+1)+".";}
  return <div style={{padding:"16px 16px 100px",fontFamily:ff}}>
    <h1 style={{fontFamily:fd,fontSize:26,fontWeight:700,marginBottom:16}}>📅 Verlauf</h1>
    {last7.length>0&&<Cd s={{marginBottom:16,background:T.priL,borderColor:T.pri}}>
      <p style={{fontWeight:700,fontSize:15,fontFamily:fd,marginBottom:12}}>Diese Woche</p>
      <div style={{display:"flex",gap:12,marginBottom:12}}>
        <div style={{flex:1,textAlign:"center",background:"rgba(255,255,255,.5)",borderRadius:10,padding:"10px 0"}}>
          <p style={{fontFamily:fd,fontSize:22,fontWeight:700,color:T.pri,margin:0}}>{avgKcal}</p>
          <p style={{fontSize:11,color:T.tx2,margin:"2px 0 0"}}>Ø kcal/Tag</p>
        </div>
        <div style={{flex:1,textAlign:"center",background:"rgba(255,255,255,.5)",borderRadius:10,padding:"10px 0"}}>
          <p style={{fontFamily:fd,fontSize:22,fontWeight:700,color:T.ok,margin:0}}>{adherence}/{last7.length}</p>
          <p style={{fontSize:11,color:T.tx2,margin:"2px 0 0"}}>Ziel erreicht</p>
        </div>
      </div>
      <div style={{display:"flex",gap:3}}>
        {allDays.slice(0,7).map(function(d,i){var pct=Math.min(100,(d.kcal/kcalGoal)*100);return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{width:"100%",height:32,background:T.ca,borderRadius:4,overflow:"hidden",display:"flex",alignItems:"flex-end"}}>
            {d.entryCount>0&&<div style={{width:"100%",height:pct+"%",minHeight:4,background:d.goalHit?T.ok:T.err,borderRadius:4}}/>}
          </div>
          <span style={{fontSize:9,color:T.tx3}}>{d.date===getDay()?"H":fmtDate(d.date).slice(0,2)}</span>
        </div>;})}
      </div>
    </Cd>}
    {allDays.length===0?<div style={{textAlign:"center",padding:"48px 0",color:T.tx3}}>
      <div style={{fontSize:40,marginBottom:10}}>📊</div><p style={{fontSize:15}}>Noch keine Daten</p>
    </div>:allDays.map(function(day){
      var pct=Math.min(100,(day.kcal/kcalGoal)*100);
      var isT=day.date===getDay();
      return <div key={day.date} style={{marginBottom:6,padding:"11px 13px",background:T.card,borderRadius:12,border:"1px solid "+(isT?T.pri:T.brd)}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:day.entryCount>0?6:0}}>
          <p style={{fontSize:14,fontWeight:isT?700:500,color:T.tx,margin:0}}>{isT?"Heute":fmtDate(day.date)}</p>
          {day.entryCount>0?<span style={{fontSize:13,fontWeight:600,color:day.goalHit?T.ok:T.tx2}}>{day.kcal} kcal {day.goalHit?"✓":"✗"}</span>:<span style={{fontSize:12,color:T.tx3}}>Keine Einträge</span>}
        </div>
        {day.entryCount>0&&<div style={{height:4,background:T.ca,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:day.goalHit?T.ok:T.err,borderRadius:2}}/></div>}
      </div>;
    })}
  </div>;
}

/* LOGIN */
function LoginScreen(){
  var _l=useState(false),loading=_l[0],setLoading=_l[1];
  var _e=useState(""),err=_e[0],setErr=_e[1];
  function signIn(){
    setLoading(true);setErr("");
    var provider=new firebase.auth.GoogleAuthProvider();
    fbAuth.signInWithPopup(provider).catch(function(e){
      if(e.code==="auth/popup-blocked"||e.code==="auth/popup-closed-by-user"){
        fbAuth.signInWithRedirect(provider);
      } else {
        setErr("Anmeldung fehlgeschlagen. Bitte nochmal versuchen.");
        setLoading(false);
      }
    });
  }
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:T.bg,padding:24,fontFamily:ff}}>
    <div style={{textAlign:"center",maxWidth:340}}>
      <div style={{width:80,height:80,borderRadius:24,background:T.priL,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontSize:40}}>⚡</div>
      <h1 style={{fontFamily:fd,fontSize:30,fontWeight:700,marginBottom:8}}>LifeOS</h1>
      <p style={{color:T.tx2,marginBottom:32,lineHeight:1.6,fontSize:15}}>Melde dich an um deine Daten auf iPhone und iPad zu synchronisieren.</p>
      {err&&<p style={{color:T.err,fontSize:13,marginBottom:16,background:T.errL,padding:"10px 14px",borderRadius:10}}>{err}</p>}
      <Btn onClick={signIn} disabled={loading} s={Object.assign({},bpS,{width:"100%",justifyContent:"center",gap:10,fontSize:16,padding:"14px 24px"})}>
        <span style={{fontSize:20}}>🔑</span><span>{loading?"Wird angemeldet…":"Mit Google anmelden"}</span>
      </Btn>
      <p style={{color:T.tx3,fontSize:12,marginTop:20,lineHeight:1.5}}>Deine Daten werden sicher in Firebase gespeichert und nur mit deinem Google-Account verknüpft.</p>
    </div>
  </div>;
}

/* MAIN */
var TABS=[{id:"home",l:"Today",i:"☀️"},{id:"nutr",l:"Essen",i:"🍽️"},{id:"verlauf",l:"Verlauf",i:"📅"}];

function App(){
  var _s=useReducer(red,mkS(null)),state=_s[0],dispatch=_s[1];
  var _tab=useState("home"),tab=_tab[0],setTab=_tab[1];
  var _stack=useState([]),stack=_stack[0],setStack=_stack[1];
  var _w=useState(window.innerWidth>=768),wide=_w[0],setWide=_w[1];
  var _user=useState(null),user=_user[0],setUser=_user[1];
  var _authL=useState(true),authLoading=_authL[0],setAuthLoading=_authL[1];
  var _dm=useState(function(){var s=localStorage.getItem("lifeos-dm");return s!==null?s==="1":window.matchMedia("(prefers-color-scheme: dark)").matches;}),darkMode=_dm[0],setDarkMode=_dm[1];
  var loaded=useRef(false);
  var syncing=useRef(false);
  Object.assign(T,darkMode?TD:TL);

  useEffect(function(){
    document.body.style.background=darkMode?TD.bg:TL.bg;
    localStorage.setItem("lifeos-dm",darkMode?"1":"0");
  },[darkMode]);

  useEffect(function(){
    fbAuth.getRedirectResult().catch(function(){});
    var unsub=fbAuth.onAuthStateChanged(function(u){
      setUser(u);
      setAuthLoading(false);
    });
    return unsub;
  },[]);

  useEffect(function(){
    if(authLoading)return;
    loaded.current=false;
    if(user){
      var unsubSnap=db.collection("users").doc(user.uid).onSnapshot(function(doc){
        if(!loaded.current){
          // Initial load
          if(doc.exists&&doc.data().state){
            dispatch({type:"LD",data:doc.data().state});
          } else {
            try{var raw=localStorage.getItem(STORE);if(raw)dispatch({type:"LD",data:JSON.parse(raw)})}catch(e){}
          }
          loaded.current=true;
        } else if(!syncing.current&&doc.exists&&doc.data().state){
          // Real-time update from another device
          dispatch({type:"LD",data:doc.data().state});
        }
      },function(){
        try{var raw=localStorage.getItem(STORE);if(raw)dispatch({type:"LD",data:JSON.parse(raw)})}catch(e){}
        loaded.current=true;
      });
      return unsubSnap;
    } else {
      try{var raw=localStorage.getItem(STORE);if(raw){dispatch({type:"LD",data:JSON.parse(raw)})}}catch(e){}
      loaded.current=true;
    }
  },[user,authLoading]);

  useEffect(function(){
    if(!loaded.current)return;
    var t=setTimeout(function(){
      try{localStorage.setItem(STORE,JSON.stringify(state))}catch(e){}
      if(user&&!syncing.current){
        syncing.current=true;
        db.collection("users").doc(user.uid).set({state:state}).finally(function(){syncing.current=false;});
      }
    },3000);
    return function(){clearTimeout(t)};
  },[state,user]);

  useEffect(function(){
    function onR(){setWide(window.innerWidth>=768)}
    window.addEventListener("resize",onR);
    return function(){window.removeEventListener("resize",onR)};
  },[]);

  var nav=useCallback(function(scr,params){setStack(function(p){return p.concat([{scr:scr,params:params}])})},[]);
  var back=useCallback(function(){setStack(function(p){return p.slice(0,-1)})},[]);
  var cur=stack[stack.length-1];

  if(authLoading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:T.bg}}><div style={{textAlign:"center"}}><div style={{fontSize:48,marginBottom:16}}>⚡</div><p style={{color:T.tx2,fontFamily:ff}}>Wird geladen…</p></div></div>;
  if(!user)return <LoginScreen/>;
  if(!state.ob)return <Ctx.Provider value={{state:state,dispatch:dispatch,user:user,darkMode:darkMode,toggleDark:function(){setDarkMode(function(v){return !v})}}}><div style={{fontFamily:ff,background:T.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}><Onboard/></div></Ctx.Provider>;

  function render(){
    if(cur){
      if(cur.scr==="det")return <Det id={cur.params.id} nav={nav} back={back}/>;
      if(cur.scr==="ed")return <Ed id={cur.params?cur.params.id:undefined} back={back}/>;
      if(cur.scr==="ld")return <LDet id={cur.params.id} back={back}/>;
      if(cur.scr==="settings")return <Sett nav={nav}/>;
    }
    if(tab==="home")return <Home nav={nav}/>;
    if(tab==="nutr")return <NutrTab/>;
    if(tab==="verlauf")return <Verlauf/>;
    return <Home nav={nav}/>;
  }

  if(wide){
    return <Ctx.Provider value={{state:state,dispatch:dispatch,user:user,darkMode:darkMode,toggleDark:function(){setDarkMode(function(v){return !v})}}}>
      <div style={{display:"flex",height:"100vh",background:T.bg,color:T.tx,fontFamily:ff,overflow:"hidden"}}>
        <div style={{width:230,background:T.card,borderRight:"1px solid "+T.brd,display:"flex",flexDirection:"column",padding:"28px 12px 20px",flexShrink:0}}>
          <div style={{padding:"0 10px 28px"}}>
            <p style={{fontFamily:fd,fontSize:24,fontWeight:700,color:T.tx}}>⚡ LifeOS</p>
          </div>
          {TABS.map(function(t){return <Btn key={t.id} onClick={function(){setTab(t.id);setStack([])}} s={{width:"100%",justifyContent:"flex-start",gap:12,padding:"11px 14px",borderRadius:12,background:tab===t.id?T.priL:"none",color:tab===t.id?T.pri:T.tx,fontSize:15,fontWeight:tab===t.id?600:400,marginBottom:2}}><span style={{fontSize:20}}>{t.i}</span><span>{t.l}</span></Btn>})}
          <div style={{flex:1}}/>
          <Btn onClick={function(){setDarkMode(function(v){return !v})}} s={{width:"100%",justifyContent:"flex-start",gap:12,padding:"11px 14px",borderRadius:12,background:"none",color:T.tx2,fontSize:15,fontWeight:400,marginBottom:2}}><span style={{fontSize:20}}>{darkMode?"☀️":"🌙"}</span><span>{darkMode?"Light Mode":"Dark Mode"}</span></Btn>
          <Btn onClick={function(){nav("settings")}} s={{width:"100%",justifyContent:"flex-start",gap:12,padding:"11px 14px",borderRadius:12,background:"none",color:T.tx2,fontSize:15,fontWeight:400}}><span style={{fontSize:20}}>⚙️</span><span>Einstellungen</span></Btn>
        </div>
        <div style={{flex:1,overflowY:"auto",height:"100vh",background:T.bg}}>
          <div style={{maxWidth:780,margin:"0 auto"}}>
            {render()}
          </div>
        </div>
      </div>
    </Ctx.Provider>;
  }

  return <Ctx.Provider value={{state:state,dispatch:dispatch,user:user,darkMode:darkMode,toggleDark:function(){setDarkMode(function(v){return !v})}}}>
    <div style={{fontFamily:ff,background:T.bg,color:T.tx,minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative",paddingBottom:80}}>
      {render()}
      {!cur&&<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,255,255,.95)",backdropFilter:"blur(20px)",borderTop:"1px solid "+T.brd,display:"flex",justifyContent:"space-around",padding:"6px 0 env(safe-area-inset-bottom,8px)",zIndex:100}}>
        {TABS.map(function(t){return <Btn key={t.id} onClick={function(){setTab(t.id);setStack([])}} s={{flexDirection:"column",gap:1,padding:"6px 5px",background:"none",fontSize:9,color:tab===t.id?T.pri:T.tx3,fontWeight:tab===t.id?600:400,minWidth:0,flex:1}}><span style={{fontSize:20,lineHeight:"1"}}>{t.i}</span><span style={{whiteSpace:"nowrap"}}>{t.l}</span></Btn>})}
        <Btn onClick={function(){nav("settings")}} s={{flexDirection:"column",gap:1,padding:"6px 5px",background:"none",fontSize:9,color:T.tx3,minWidth:0,flex:1}}><span style={{fontSize:20,lineHeight:"1"}}>⚙️</span><span style={{whiteSpace:"nowrap"}}>More</span></Btn>
      </div>}
    </div>
  </Ctx.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
// Register Service Worker for offline support & PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(function(reg) {
        console.log('[LifeOS] SW registered, scope:', reg.scope);
      })
      .catch(function(err) {
        console.log('[LifeOS] SW registration failed:', err);
      });
  });
}
</script>
</body>
